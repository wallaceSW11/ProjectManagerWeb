name: Build e Release

on:
  push:
    branches:
      - main

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: build-frontend
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/frontend

      - name: Publicar backend
        run: dotnet publish backend/ProjectManagerWeb.csproj -c Release -r win-x64 --self-contained false -o publish

      - name: Gerar versão
        id: versao
        run: echo "VERSAO=v$(date -u +'%Y.%m.%d.%H%M')" >> "$GITHUB_OUTPUT"

      - name: Compactar artefato
        run: cd publish && zip -r ../PMW_${{ steps.versao.outputs.VERSAO }}.zip .

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versao.outputs.VERSAO }}
          name: PMW ${{ steps.versao.outputs.VERSAO }}
          files: PMW_${{ steps.versao.outputs.VERSAO }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
