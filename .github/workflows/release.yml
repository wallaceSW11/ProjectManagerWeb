name: Build e Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        id: bump
        run: |
          VERSAO_ATUAL=$(jq -r '.version' frontend/package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSAO_ATUAL"
          NOVA_VERSAO="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "version=$NOVA_VERSAO" >> "$GITHUB_OUTPUT"

          jq ".version = \"$NOVA_VERSAO\"" frontend/package.json > frontend/package.json.tmp
          mv frontend/package.json.tmp frontend/package.json

          sed -i "s/<Version>[0-9.]*<\/Version>/<Version>$NOVA_VERSAO<\/Version>/" backend/ProjectManagerWeb.csproj

          git config user.name "PMW CI"
          git config user.email "ci@pmw.local"
          git add frontend/package.json backend/ProjectManagerWeb.csproj
          git commit -m "chore(release): bump version to $NOVA_VERSAO"
          git push

  build-frontend:
    runs-on: ubuntu-latest
    needs: bump-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: [bump-version, build-frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/frontend

      - name: Publicar Windows (self-contained)
        run: dotnet publish backend/ProjectManagerWeb.csproj -c Release -r win-x64 --self-contained true -o publish-win

      - name: Publicar Linux (self-contained)
        run: dotnet publish backend/ProjectManagerWeb.csproj -c Release -r linux-x64 --self-contained true -o publish-linux

      - name: Copiar infra para ambos os pacotes
        run: |
          cp -r infra publish-linux/
          cp -r infra publish-win/

      - name: Compactar artefatos
        run: |
          cd publish-win && zip -r ../PMW_Windows_${{ needs.bump-version.outputs.version }}.zip .
          cd ../publish-linux && zip -r ../PMW_Linux_${{ needs.bump-version.outputs.version }}.zip .

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump-version.outputs.version }}
          name: PMW v${{ needs.bump-version.outputs.version }}
          files: |
            PMW_Windows_${{ needs.bump-version.outputs.version }}.zip
            PMW_Linux_${{ needs.bump-version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
