name: Build e Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install
          pnpm run build

      - name: Copiar frontend para backend
        shell: pwsh
        run: |
          xcopy frontend\dist\* backend\frontend /s /e /y /i

      - name: Publicar backend
        shell: pwsh
        run: |
          dotnet publish backend\ProjectManagerWeb.csproj -c Release -o publish

      - name: Gerar versão
        id: versao
        shell: pwsh
        run: |
          $versao = "v$(Get-Date -Format 'yyyy.MM.dd.HHmm')"
          echo "VERSAO=$versao" >> $env:GITHUB_OUTPUT

      - name: Compactar artefato
        shell: pwsh
        run: |
          Compress-Archive -Path publish\* -DestinationPath PMW_${{ steps.versao.outputs.VERSAO }}.zip

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.versao.outputs.VERSAO }}
          name: PMW ${{ steps.versao.outputs.VERSAO }}
          files: PMW_${{ steps.versao.outputs.VERSAO }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
